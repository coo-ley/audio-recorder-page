<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ブラウザ録音</title>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy:    #002D58;
      --primary: #2196F3;
      --bg:      #E3F2FD;
      --card:    #ffffff;
      --border:  #BBDEFB;
      --red:     #ef4444;
      --red-d:   #b91c1c;
      --gray:    #64748b;
      --gray-d:  #475569;
      --green:   #22c55e;
      --green-d: #15803d;
      --yellow:  #f59e0b;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Zen Maru Gothic', sans-serif;
      background: var(--bg);
      color: var(--navy);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 40px;
    }

    .logo { height: 32px; object-fit: contain; margin-bottom: 18px; }

    .card {
      background: var(--card);
      border-radius: 20px;
      box-shadow: 0 6px 28px rgba(0,45,88,.12);
      padding: 28px 24px 24px;
      width: 100%; max-width: 420px;
      display: flex; flex-direction: column; gap: 18px;
    }

    h2 { text-align: center; font-size: 1.1rem; letter-spacing: .04em; }

    /* ===== ステータスバー ===== */
    .status-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px; border-radius: 12px;
      background: #f0f9ff; border: 2px solid var(--border);
      transition: background .3s, border-color .3s;
      min-height: 48px;
    }
    .status-bar.recording { background: #fff1f2; border-color: var(--red); }
    .status-bar.paused    { background: #fffbeb; border-color: var(--yellow); }
    .status-bar.done      { background: #f0fdf4; border-color: var(--green); }
    .status-bar.error     { background: #fff1f2; border-color: var(--red); }

    .status-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #94a3b8; flex-shrink: 0;
      transition: background .3s;
    }
    .status-bar.recording .status-dot {
      background: var(--red);
      animation: blink 1s ease-in-out infinite;
    }
    .status-bar.paused .status-dot { background: var(--yellow); }
    .status-bar.done   .status-dot { background: var(--green); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    .status-text {
      flex: 1; margin: 0 12px;
      font-size: .88rem; font-weight: 700; color: #475569;
    }
    .status-bar.recording .status-text { color: var(--red-d); }
    .status-bar.paused    .status-text { color: #92400e; }
    .status-bar.done      .status-text { color: var(--green-d); }

    .timer {
      font-size: 1.1rem; font-weight: 700; color: var(--red);
      font-variant-numeric: tabular-nums; letter-spacing: .03em;
      min-width: 48px; text-align: right;
      display: none;
    }
    .status-bar.recording .timer,
    .status-bar.paused    .timer { display: block; }
    .status-bar.paused .timer { color: var(--yellow); }

    /* ===== 波形 ===== */
    .wave-wrap {
      border-radius: 14px; overflow: hidden;
      background: #0f172a;
      height: 90px; position: relative;
    }
    canvas { width: 100%; height: 100%; display: block; }
    .wave-idle-msg {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: .82rem; color: #475569; font-weight: 700;
      pointer-events: none;
    }

    /* ===== コントロールボタン ===== */
    .controls { display: flex; gap: 8px; }

    button {
      flex: 1; padding: 13px 8px;
      border: none; border-radius: 12px;
      font-family: inherit; font-size: .9rem; font-weight: 700;
      cursor: pointer; transition: opacity .15s, transform .1s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    button:hover:not(:disabled) { opacity: .88; transform: translateY(-1px); }
    button:active:not(:disabled){ transform: translateY(1px); }
    button:disabled { opacity: .38; cursor: not-allowed; transform: none !important; }

    .btn-record { background: var(--red);    color: #fff; box-shadow: 0 4px 0 var(--red-d); }
    .btn-pause  { background: var(--yellow); color: #fff; box-shadow: 0 4px 0 #d97706; }
    .btn-stop   { background: var(--gray);   color: #fff; box-shadow: 0 4px 0 var(--gray-d); }
    .btn-record:disabled,
    .btn-pause:disabled,
    .btn-stop:disabled { box-shadow: none; }

    .btn-send {
      width: 100%; background: var(--green); color: #fff;
      box-shadow: 0 4px 0 var(--green-d); display: none;
    }
    .btn-send:disabled { box-shadow: none; }

    .btn-redo {
      width: 100%; background: #f1f5f9; color: #475569;
      border: 2px solid #e2e8f0; box-shadow: none; display: none;
    }

    /* ===== プレビュー ===== */
    audio {
      width: 100%; border-radius: 8px; display: none;
      accent-color: var(--primary);
    }

    /* ===== エラー ===== */
    .err-box {
      background: #fee2e2; border: 2px solid #fca5a5;
      border-radius: 12px; padding: 12px 16px;
      font-size: .82rem; line-height: 1.6; color: var(--red-d);
      display: none;
    }

    .note {
      font-size: .75rem; color: #94a3b8;
      text-align: center; line-height: 1.6;
    }
  </style>
</head>
<body>

<img class="logo"
     src="https://lh3.googleusercontent.com/d/1_d0f_m2u5x9ddorgo3k7m6691SVMZnIf"
     alt="Everest">

<div class="card">
  <h2>🎙️ ブラウザ録音</h2>

  <!-- ステータス -->
  <div class="status-bar" id="statusBar">
    <div class="status-dot" id="dot"></div>
    <div class="status-text" id="statusText">録音ボタンを押してください</div>
    <div class="timer" id="timer">00:00</div>
  </div>

  <!-- 波形 -->
  <div class="wave-wrap">
    <canvas id="wave"></canvas>
    <div class="wave-idle-msg" id="waveMsg">🎤 マイク待機中</div>
  </div>

  <!-- コントロール -->
  <div class="controls">
    <button class="btn-record" id="btnRec"    onclick="startRec()">● 録音開始</button>
    <button class="btn-pause"  id="btnPause"  onclick="togglePause()" disabled>⏸ 一時停止</button>
    <button class="btn-stop"   id="btnStop"   onclick="stopRec()" disabled>■ 録音終了</button>
  </div>

  <!-- プレビュー -->
  <audio id="preview" controls></audio>

  <!-- 送信・録り直し -->
  <button class="btn-send" id="btnSend" onclick="sendBlob()">✅ この録音を元のページに送る</button>
  <button class="btn-redo" id="btnRedo" onclick="redo()">🔄 録り直し</button>

  <!-- エラー -->
  <div class="err-box" id="errBox"></div>

  <p class="note" id="note">
    録音した音声は元のページに送信されます。<br>送信後このタブは自動的に閉じます。
  </p>
</div>

<script>
  // ===== 状態 =====
  var mr = null, stream = null, audioCtx = null, analyser = null;
  var chunks = [], blob = null;
  var sec = 0, timerIv = null, animId = null;
  var isPaused = false, sent = false;

  window.addEventListener('beforeunload', function(e) {
    if (blob && !sent) {
      e.preventDefault();
      e.returnValue = '';
    }
  });

  var canvas  = document.getElementById('wave');
  var ctx     = canvas.getContext('2d');

  // canvas サイズを実ピクセルに合わせる
  function resizeCanvas() {
    var rect = canvas.getBoundingClientRect();
    canvas.width  = rect.width  * devicePixelRatio;
    canvas.height = rect.height * devicePixelRatio;
    ctx.scale(devicePixelRatio, devicePixelRatio);
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  // ===== 録音開始 =====
  function startRec() {
    navigator.mediaDevices.getUserMedia({ audio: true, video: false })
      .then(function(s) {
        stream  = s;
        chunks  = [];
        isPaused = false;

        // Web Audio API で波形取得
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 1024;
        var src = audioCtx.createMediaStreamSource(s);
        src.connect(analyser);

        mr = new MediaRecorder(s);
        mr.ondataavailable = function(e) { if (e.data.size > 0) chunks.push(e.data); };
        mr.onstop = onStop;
        mr.start(100);

        setStatus('recording', '録音中…');
        document.getElementById('btnRec').disabled   = true;
        document.getElementById('btnPause').disabled = false;
        document.getElementById('btnStop').disabled  = false;
        document.getElementById('waveMsg').style.display = 'none';

        sec = 0; tick();
        timerIv = setInterval(function() { if (!isPaused) { sec++; tick(); } }, 1000);

        drawWave();
      })
      .catch(function(e) {
        showError('マイクへのアクセスが拒否されました。<br>ブラウザのアドレスバー横のマイクアイコンから許可してください。<br><small>' + e.message + '</small>');
      });
  }

  // ===== 一時停止 / 再開 =====
  function togglePause() {
    if (!mr) return;
    if (!isPaused) {
      mr.pause();
      isPaused = true;
      setStatus('paused', '一時停止中');
      document.getElementById('btnPause').textContent = '▶ 再開';
    } else {
      mr.resume();
      isPaused = false;
      setStatus('recording', '録音中…');
      document.getElementById('btnPause').textContent = '⏸ 一時停止';
    }
  }

  // ===== 録音停止 =====
  function stopRec() {
    clearInterval(timerIv);
    cancelAnimationFrame(animId);
    mr.stop();
    stream.getTracks().forEach(function(t) { t.stop(); });
    document.getElementById('btnPause').disabled = true;
    document.getElementById('btnStop').disabled  = true;
    setStatus('recording', '処理中…');
    drawFlat();
  }

  function onStop() {
    blob = new Blob(chunks, { type: 'audio/webm' });
    var preview = document.getElementById('preview');
    preview.src = URL.createObjectURL(blob);
    preview.style.display = 'block';

    // ローカルに自動保存
    var now = new Date();
    var pad = function(n) { return String(n).padStart(2, '0'); };
    var fname = 'recording_'
      + now.getFullYear()
      + pad(now.getMonth() + 1)
      + pad(now.getDate())
      + '_'
      + pad(now.getHours())
      + pad(now.getMinutes())
      + '.webm';
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = fname;
    a.click();

    setStatus('done', '📨 元のページに送信中…');
    drawFlat();

    // 自動送信して元のページに戻る
    setTimeout(function() { sendBlob(); }, 400);
  }

  // ===== 送信 =====
  function sendBlob() {
    if (!blob) return;
    if (!window.opener) {
      showError('元のページとの接続が切れています。<br>元のページを再読み込みしてもう一度お試しください。');
      return;
    }
    sent = true;
    document.getElementById('btnSend').disabled = true;
    document.getElementById('btnRedo').disabled = true;
    window.opener.postMessage({ type: 'gasRecording', blob: blob }, '*');
    setStatus('done', '📨 送信しました！');
    document.getElementById('note').textContent = 'このタブを閉じてください。';
    setTimeout(function() { window.close(); }, 1200);
  }

  // ===== 録り直し =====
  function redo() {
    blob = null;
    var preview = document.getElementById('preview');
    if (preview.src) URL.revokeObjectURL(preview.src);
    preview.src = '';
    preview.style.display = 'none';

    isPaused = false;
    sec = 0;
    document.getElementById('timer').textContent = '00:00';
    document.getElementById('btnRec').disabled   = false;
    document.getElementById('btnPause').disabled = true;
    document.getElementById('btnPause').textContent = '⏸ 一時停止';
    document.getElementById('btnStop').disabled  = true;
    document.getElementById('btnSend').style.display = 'none';
    document.getElementById('btnRedo').style.display = 'none';
    document.getElementById('waveMsg').style.display = '';
    document.getElementById('errBox').style.display  = 'none';
    document.getElementById('note').textContent =
      '録音した音声は元のページに送信されます。送信後このタブは自動的に閉じます。';
    setStatus('', '録音ボタンを押してください');
    drawFlat();
  }

  // ===== タイマー =====
  function tick() {
    var m = String(Math.floor(sec / 60)).padStart(2, '0');
    var s = String(sec % 60).padStart(2, '0');
    document.getElementById('timer').textContent = m + ':' + s;
  }

  // ===== ステータス =====
  function setStatus(cls, msg) {
    var bar = document.getElementById('statusBar');
    bar.className = 'status-bar' + (cls ? ' ' + cls : '');
    document.getElementById('statusText').textContent = msg;
  }

  // ===== エラー =====
  function showError(msg) {
    var el = document.getElementById('errBox');
    el.innerHTML = msg;
    el.style.display = 'block';
    setStatus('error', 'エラーが発生しました');
  }

  // ===== 波形描画 =====
  function drawWave() {
    if (!analyser) return;
    var bufLen = analyser.frequencyBinCount;
    var data   = new Uint8Array(bufLen);

    function draw() {
      animId = requestAnimationFrame(draw);
      analyser.getByteTimeDomainData(data);

      var W = canvas.width  / devicePixelRatio;
      var H = canvas.height / devicePixelRatio;

      ctx.fillStyle = '#0f172a';
      ctx.fillRect(0, 0, W, H);

      // グロー効果
      ctx.shadowBlur  = isPaused ? 0 : 8;
      ctx.shadowColor = isPaused ? 'transparent' : 'rgba(56,189,248,.7)';
      ctx.lineWidth   = 2;
      ctx.strokeStyle = isPaused ? '#f59e0b' : '#38bdf8';
      ctx.beginPath();

      var sw = W / bufLen;
      var x  = 0;
      for (var i = 0; i < bufLen; i++) {
        var v = data[i] / 128.0;
        var y = v * H / 2;
        if (i === 0) ctx.moveTo(x, y);
        else         ctx.lineTo(x, y);
        x += sw;
      }
      ctx.lineTo(W, H / 2);
      ctx.stroke();
      ctx.shadowBlur = 0;
    }
    draw();
  }

  function drawFlat() {
    var W = canvas.width  / devicePixelRatio;
    var H = canvas.height / devicePixelRatio;
    ctx.fillStyle = '#0f172a';
    ctx.fillRect(0, 0, W, H);
    ctx.lineWidth   = 1.5;
    ctx.strokeStyle = '#1e3a5f';
    ctx.beginPath();
    ctx.moveTo(0, H / 2);
    ctx.lineTo(W, H / 2);
    ctx.stroke();
  }

  drawFlat();

  // opener チェック
  if (!window.opener) {
    document.getElementById('note').innerHTML =
      '⚠️ このページは元のページから開く必要があります。<br>直接開いた場合、録音を送信できません。';
  }
</script>
</body>
</html>
