<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ブラウザ録音</title>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2196F3;
      --primary-dark: #1976D2;
      --navy: #002D58;
      --bg: #E3F2FD;
      --card: #FFFFFF;
      --border: #BBDEFB;
      --radius: 16px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Zen Maru Gothic', sans-serif;
      background: var(--bg);
      color: var(--navy);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 40px;
    }
    .logo-wrap {
      margin-bottom: 20px;
    }
    .logo-wrap img {
      height: 36px;
      object-fit: contain;
    }
    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: 0 4px 18px rgba(0,0,0,.10);
      padding: 28px 24px;
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    h2 {
      text-align: center;
      font-size: 1.1rem;
      color: var(--navy);
    }

    /* ステータスボックス */
    .rec-box {
      border: 2.5px dashed var(--border);
      border-radius: var(--radius);
      padding: 28px 16px;
      text-align: center;
      background: #f0f9ff;
      transition: border-color .2s, background .2s;
    }
    .rec-box.recording {
      border-color: #ef4444;
      background: #fff5f5;
      animation: pulse 1.5s ease-in-out infinite;
    }
    .rec-box.done {
      border-color: #22c55e;
      background: #f0fdf4;
    }
    .rec-box.error {
      border-color: #ef4444;
      background: #fff5f5;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,.3); }
      50%       { box-shadow: 0 0 0 10px rgba(239,68,68,0); }
    }
    .rec-icon  { font-size: 2.4rem; margin-bottom: 8px; }
    .rec-status { font-size: .95rem; font-weight: 700; color: #475569; }
    .rec-timer {
      font-size: 2rem; font-weight: 700; color: #ef4444;
      margin-top: 8px; display: none;
      font-variant-numeric: tabular-nums;
    }

    /* ボタン群 */
    button {
      width: 100%; padding: 13px;
      border: none; border-radius: 12px;
      font-family: inherit; font-size: 1rem; font-weight: 700;
      cursor: pointer; transition: opacity .15s, transform .1s;
      letter-spacing: .03em;
    }
    button:hover:not(:disabled) { opacity: .9; transform: translateY(-1px); }
    button:active:not(:disabled) { transform: translateY(1px); }
    button:disabled { opacity: .45; cursor: not-allowed; transform: none; }

    .btn-start {
      background: #ef4444; color: #fff;
      box-shadow: 0 4px 0 #b91c1c;
    }
    .btn-start:disabled { box-shadow: none; }
    .btn-stop {
      background: #64748b; color: #fff;
      box-shadow: 0 4px 0 #475569;
    }
    .btn-stop:disabled { box-shadow: none; }
    .btn-send {
      background: #22c55e; color: #fff;
      box-shadow: 0 4px 0 #15803d;
      display: none;
    }
    .btn-send:disabled { box-shadow: none; }
    .btn-redo {
      background: #f1f5f9; color: #475569;
      border: 2px solid #e2e8f0;
      box-shadow: none;
      display: none;
    }

    audio {
      width: 100%;
      display: none;
      border-radius: 8px;
    }

    .notice {
      font-size: .78rem;
      color: #64748b;
      text-align: center;
      line-height: 1.6;
    }
    .notice.error-msg {
      color: #b91c1c;
      background: #fee2e2;
      border: 2px solid #fca5a5;
      border-radius: 10px;
      padding: 10px 14px;
      display: none;
    }
  </style>
</head>
<body>

<div class="logo-wrap">
  <img src="https://lh3.googleusercontent.com/d/1_d0f_m2u5x9ddorgo3k7m6691SVMZnIf" alt="Everest">
</div>

<div class="card">
  <h2>🎙️ ブラウザ録音</h2>

  <div class="rec-box" id="recBox">
    <div class="rec-icon" id="recIcon">🎙️</div>
    <div class="rec-status" id="recStatus">録音ボタンを押してマイクを許可してください</div>
    <div class="rec-timer" id="recTimer">00:00</div>
  </div>

  <audio id="preview" controls></audio>

  <button class="btn-start" id="btnStart" onclick="startRec()">● 録音開始</button>
  <button class="btn-stop"  id="btnStop"  onclick="stopRec()" disabled>■ 録音停止</button>
  <button class="btn-send"  id="btnSend"  onclick="sendBlob()">✅ この録音を元のページに送る</button>
  <button class="btn-redo"  id="btnRedo"  onclick="redo()">🔄 録り直し</button>

  <p class="notice error-msg" id="errMsg"></p>
  <p class="notice" id="notice">録音した音声は元のページに送信されます。<br>送信後このタブは自動的に閉じます。</p>
</div>

<script>
  var mr = null, stream = null, chunks = [], blob = null;
  var sec = 0, timerIv = null;

  function startRec() {
    navigator.mediaDevices.getUserMedia({ audio: true })
      .then(function(s) {
        stream = s;
        chunks = [];
        mr = new MediaRecorder(s);
        mr.ondataavailable = function(e) { if (e.data.size > 0) chunks.push(e.data); };
        mr.onstop = onRecStop;
        mr.start();

        setBox('recording', '🔴', '録音中...');
        document.getElementById('recTimer').style.display = 'block';
        document.getElementById('btnStart').disabled = true;
        document.getElementById('btnStop').disabled = false;
        sec = 0; tick();
        timerIv = setInterval(function() { sec++; tick(); }, 1000);
      })
      .catch(function(e) {
        showError('マイクへのアクセスが拒否されました。<br>ブラウザのアドレスバー横のマイクアイコンから許可してください。<br>(' + e.message + ')');
      });
  }

  function stopRec() {
    mr.stop();
    stream.getTracks().forEach(function(t) { t.stop(); });
    clearInterval(timerIv);
    document.getElementById('btnStop').disabled = true;
    document.getElementById('recTimer').style.display = 'none';
    setBox('recording', '⏳', '処理中...');
  }

  function onRecStop() {
    blob = new Blob(chunks, { type: 'audio/webm' });
    var url = URL.createObjectURL(blob);
    var audio = document.getElementById('preview');
    audio.src = url;
    audio.style.display = 'block';

    setBox('done', '✅', '録音完了 — 再生して確認できます');
    document.getElementById('btnSend').style.display = 'block';
    document.getElementById('btnRedo').style.display = 'block';
    document.getElementById('notice').textContent = '内容を確認して「送る」を押してください。';
  }

  function sendBlob() {
    if (!blob) return;
    if (!window.opener) {
      showError('元のページとの接続が切れています。<br>元のページを再読み込みしてから、もう一度試してください。');
      return;
    }
    document.getElementById('btnSend').disabled = true;
    document.getElementById('btnRedo').disabled = true;
    window.opener.postMessage({ type: 'gasRecording', blob: blob }, '*');
    setBox('done', '📨', '送信しました！このタブを閉じてください。');
    document.getElementById('notice').textContent = '';
    setTimeout(function() { window.close(); }, 1200);
  }

  function redo() {
    blob = null;
    var audio = document.getElementById('preview');
    if (audio.src) URL.revokeObjectURL(audio.src);
    audio.src = '';
    audio.style.display = 'none';
    setBox('', '🎙️', '録音ボタンを押してください');
    document.getElementById('recTimer').textContent = '00:00';
    document.getElementById('btnStart').disabled = false;
    document.getElementById('btnStop').disabled = true;
    document.getElementById('btnSend').style.display = 'none';
    document.getElementById('btnRedo').style.display = 'none';
    document.getElementById('notice').textContent = '録音した音声は元のページに送信されます。送信後このタブは自動的に閉じます。';
    hideError();
  }

  function tick() {
    var m = String(Math.floor(sec / 60)).padStart(2, '0');
    var s = String(sec % 60).padStart(2, '0');
    document.getElementById('recTimer').textContent = m + ':' + s;
  }

  function setBox(cls, icon, status) {
    var box = document.getElementById('recBox');
    box.className = 'rec-box' + (cls ? ' ' + cls : '');
    document.getElementById('recIcon').textContent = icon;
    document.getElementById('recStatus').textContent = status;
  }

  function showError(msg) {
    var el = document.getElementById('errMsg');
    el.innerHTML = msg;
    el.style.display = 'block';
    setBox('error', '⚠️', 'エラーが発生しました');
  }

  function hideError() {
    document.getElementById('errMsg').style.display = 'none';
  }

  // opener がない場合（直接開かれた等）に警告
  if (!window.opener) {
    document.getElementById('notice').innerHTML =
      '⚠️ このページは元のページから開く必要があります。<br>直接開いた場合、録音を送信できません。';
  }
</script>
</body>
</html>
